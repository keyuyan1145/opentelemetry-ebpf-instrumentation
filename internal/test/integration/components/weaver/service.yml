# Weaver semantic convention validator — receives OTLP from the collector
# and validates emitted telemetry against the OBI schema registry under
# `schemas/obi/`, which itself depends on the upstream OpenTelemetry
# semantic conventions. Bind-mounted into the container at /obi-registry.
#
# Shared definition extended by every weaver-wired compose under
# `internal/test/integration/`. Each consumer pulls this in via:
#
#   weaver:
#     extends:
#       file: components/weaver/service.yml
#       service: weaver
#     volumes:
#       - ../../../schemas/obi:/obi-registry:ro
#
# The `volumes` mount is intentionally NOT defined here: relative paths in
# volumes resolve against the file that declares them, so the consuming
# compose must own its own bind mount or the registry path would be wrong.
#
# weaver writes its live-check report to /tmp/weaver-out/live_check.json,
# bind-mounted to /tmp/obi-weaver-out on the docker host. Test harness reads
# directly from the host path — docker cp from a stopped container on RHEL
# overlayfs returned sparse files with mid-stream NUL holes. user: 0 lets
# the container write into the docker-managed bind mount source regardless
# of host ownership.
services:
  weaver:
    image: otel/weaver:v0.24.1@sha256:263964a7d444e77812f7a2d654e17683c4760a968c91278acdb7a44c20ccd572
    container_name: weaver
    user: "0:0"
    working_dir: /obi-registry
    command:
      - registry
      - live-check
      - --registry
      - /obi-registry
      - --include-unreferenced
      - --inactivity-timeout
      - "300"
      - --admin-port
      - "4320"
      - --format
      - json
      - --diagnostic-format
      - json
      - --output
      - /tmp/weaver-out
    volumes:
      - /tmp/obi-weaver-out:/tmp/weaver-out
    ports:
      - "4320:4320" # admin port (for /stop from test host)
    healthcheck:
      test: ["CMD-SHELL", "wget --timeout=1 -q -O /dev/null http://127.0.0.1:4317/ 2>&1 | grep -qv refused"]
      interval: 5s
      timeout: 2s
      retries: 60
      start_period: 90s
