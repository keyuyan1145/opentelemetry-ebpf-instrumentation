oats-schema-version: 2
docker-compose:
  files:
  - ../docker-compose-obi-python-amqp.yml
input:
- path: /message
interval: 500ms
expected:
  traces:
  - traceql: '{ kind=producer && .messaging.system = "amqp" && .messaging.operation.type = "publish" }'
    equals: publish
    attributes:
      messaging.system: amqp
      messaging.operation.type: publish
      server.port: '5672'
  - traceql: '{ kind=consumer && .messaging.system = "amqp" && .messaging.operation.type = "process" }'
    equals: process
    attributes:
      messaging.system: amqp
      messaging.operation.type: process
      server.port: '5672'
  metrics:
  - promql: messaging_client_operation_duration_seconds_count{messaging_system="amqp"}
    value: '> 0'
  - promql: messaging_client_operation_duration_seconds_bucket{le="0"}
    value: == 0
  - promql: messaging_client_operation_duration_seconds_bucket{le="10"}
    value: '> 0'
  - promql: messaging_process_duration_seconds_count{messaging_system="amqp"}
    value: '> 0'
  - promql: messaging_process_duration_seconds_bucket{le="0"}
    value: == 0
  - promql: messaging_process_duration_seconds_bucket{le="10"}
    value: '> 0'
