#
# Fields:
#   id              human-readable identifier (used in matrix output + paths)
#   lvh_tag         exact LVH tag, e.g. "6.12-20260504.013701"
#   pr_integration  include in PR VM integration matrix
#   pr_verifier     include in PR BPF verifier matrix

